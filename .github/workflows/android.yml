name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build APK
      uses: digreatbrian/buildozer-action@v2
      with:
        python-version: 3.11
        buildozer-cmd: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LelexApp-APK
        path: bin/*.apk
